<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <div class="card">
      <h1>🌤 Weather App</h1>

      <div class="search-box">
        <input type="text" id="locationInput" placeholder="Enter city...">
        <button onclick="getWeather()">Search</button>
      </div>

      <div id="weatherResult" class="hidden">
        <h2 id="city"></h2>
        <h1 id="temp"></h1>
        <p id="condition"></p>

        <div class="extra">
          <div>
            <span>💧 Humidity</span>
            <p id="humidity"></p>
          </div>
          <div>
            <span>🌬 Wind</span>
            <p id="wind"></p>
          </div>
        </div>
      </div>

      <p id="error" class="error"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
